<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TruthLens</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            width: 320px; 
            background: #0f0f0f; 
            color: #fff; 
            font-family: Arial, sans-serif;
            padding: 16px;
        }
        h1 { font-size: 16px; margin-bottom: 12px; }
        .status { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.online { background: #10b981; }
        .dot.offline { background: #ef4444; }
        .toggle { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            margin-bottom: 16px;
        }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        .stat {
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            font-size: 12px;
        }
        .stat.real { background: #10b981; }
        .stat.ai { background: #ef4444; }
        .stat.mixed { background: #f59e0b; }
        .stat-value { font-weight: bold; font-size: 14px; }
        .settings {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #333;
        }
        .disclaimer {
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 8px;
            font-size: 10px;
            color: #aaa;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        input[type="text"] {
            width: 100%;
            padding: 6px;
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 11px;
        }
        button {
            width: 100%;
            padding: 8px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-bottom: 4px;
        }
        button:hover { background: #2563eb; }
        button.secondary {
            background: #666;
        }
        button.secondary:hover {
            background: #555;
        }
        a {
            color: #60a5fa;
            text-decoration: none;
            font-size: 10px;
        }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>TruthLens</h1>
    
    <div class="status">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Checking...</span>
    </div>

    <div class="toggle">
        <input type="checkbox" id="enableToggle" checked>
        <label for="enableToggle">Enable Detection</label>
    </div>

    <div class="stats">
        <div class="stat real">
            <div>Real-Likely</div>
            <div class="stat-value" id="countReal">0</div>
        </div>
        <div class="stat ai">
            <div>AI-Likely</div>
            <div class="stat-value" id="countAI">0</div>
        </div>
        <div class="stat mixed">
            <div>Mixed</div>
            <div class="stat-value" id="countMixed">0</div>
        </div>
    </div>

    <div class="disclaimer">
        <strong>⚠️ Disclaimer:</strong> TruthLens provides AI-assisted media analysis only. Results are confidence estimates and may not be 100% accurate. Use for informational purposes only.
    </div>

    <div class="settings">
        <label style="font-size: 11px; color: #aaa;">Backend URL:</label>
        <input type="text" id="backendUrl" placeholder="http://127.0.0.1:8000">
        <button onclick="checkBackend()">Check Backend</button>
        <button class="secondary" onclick="resetStats()">Reset Stats</button>
    </div>

    <div style="font-size: 10px; color: #888; text-align: center;">
        <a href="https://truthlens.example.com/privacy" target="_blank">Privacy Policy</a>
    </div>

    <script>
        function updateStats() {
            chrome.storage.local.get(["countReal", "countAI", "countMixed", "enabled"], (data) => {
                document.getElementById("countReal").textContent = data.countReal || 0;
                document.getElementById("countAI").textContent = data.countAI || 0;
                document.getElementById("countMixed").textContent = data.countMixed || 0;
                document.getElementById("enableToggle").checked = data.enabled !== false;
            });
        }

        async function checkHealth() {
            chrome.storage.local.get("backendUrl", async (data) => {
                const url = (data.backendUrl || "http://127.0.0.1:8000") + "/health";
                try {
                    const response = await fetch(url, { method: "GET" });
                    const dot = document.getElementById("statusDot");
                    const text = document.getElementById("statusText");
                    if (response.ok) {
                        dot.className = "dot online";
                        text.textContent = "Backend Online ✓";
                    } else {
                        dot.className = "dot offline";
                        text.textContent = "Backend Error";
                    }
                } catch (e) {
                    const dot = document.getElementById("statusDot");
                    const text = document.getElementById("statusText");
                    dot.className = "dot offline";
                    text.textContent = "Backend Offline";
                }
            });
        }

        function checkBackend() {
            checkHealth();
            alert("Backend status checked!");
        }

        function resetStats() {
            chrome.storage.local.set({ countReal: 0, countAI: 0, countMixed: 0 });
            updateStats();
        }

        document.getElementById("enableToggle").addEventListener("change", (e) => {
            chrome.storage.local.set({ enabled: e.target.checked });
        });

        document.getElementById("backendUrl").addEventListener("change", (e) => {
            chrome.storage.local.set({ backendUrl: e.target.value });
        });

        chrome.storage.local.get("backendUrl", (data) => {
            document.getElementById("backendUrl").value = data.backendUrl || "http://127.0.0.1:8000";
        });

        updateStats();
        checkHealth();
        setInterval(checkHealth, 5000);
    </script>
</body>
</html>
